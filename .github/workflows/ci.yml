name: ci

on:
    push:
    pull_request:

jobs:
    build:
        runs-on: ubuntu-24.04
        name: "python ${{ matrix.python-version }} on ${{ matrix.backend }}"
        strategy:
            matrix:
                # If you change one of these, be sure to update:
                # - /pyproject.toml:[tool.mypy]
                # If adding new python versions, consider also updating
                # python version in .readthedocs.yaml
                # TODO: Add back pypy here and in release.yml once:
                # https://github.com/pypy/pypy/issues/4956 is resolved
                python-version: ['3.12', '3.13', '3.14']
                backend: ['x11', 'wayland']
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Install Nix
              uses: cachix/install-nix-action@v27
            - name: Set up python version environment variable
              shell: bash
              run: |
                PYTHON_VERSION="${{ matrix.python-version }}"
                CLEAN_VERSION="${PYTHON_VERSION%-dev}"
                echo "QTILE_CI_PYTHON=${CLEAN_VERSION}" >> $GITHUB_ENV
            - name: Run Tests
              run: |
                nix develop --command bash -c '
                  [ "$(grep -c -P '\''\t'\'' CHANGELOG)" = "0" ]
                  dump_cores() {
                    echo "=== Listing coredumps ==="
                    coredumpctl list || true
                    echo "=== Stack trace for last coredump ==="
                    coredumpctl debug --debugger-arguments="-batch -ex '\''set pagination off'\'' -ex '\''bt full'\'' -ex '\''quit'\''" || true
                  }
                  trap dump_cores ERR
                  make QTILE_CI_PYTHON=${{ env.QTILE_CI_PYTHON }} QTILE_CI_BACKEND=${{ matrix.backend }} check check-packaging
                  coverage combine -q
                  coverage report -m
                  coverage xml
                '
            - name: Upload coverage data to coveralls.io
              continue-on-error: true
              run: |
                nix develop --command coveralls --service=github
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                COVERALLS_FLAG_NAME: ${{ format('{0}-{1}', matrix.python-version, matrix.backend) }}
                COVERALLS_PARALLEL: true
                COVERALLS_SERVICE_JOB_ID: ${{ github.run_id }}

    coverage:
        name: Finalize Coverage
        needs: build
        runs-on: ubuntu-24.04
        steps:
            - name: Coveralls Finished
              uses: coverallsapp/github-action@main
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                parallel-finished: true
