name: ci

on:
    push:
    pull_request:

jobs:
    tests:
        runs-on: ubuntu-24.04
        name: "python ${{ matrix.python-version }} on ${{ matrix.backend }}"
        strategy:
            matrix:
                # If you change one of these, be sure to update:
                # - /pyproject.toml:[tool.mypy]
                # If adding new python versions, consider also updating
                # python version in .readthedocs.yaml
                # TODO: Add back pypy here and in release.yml once:
                # https://github.com/pypy/pypy/issues/4956 is resolved
                python-version: ['3.12', '3.13', '3.14']
                backend: ['x11', 'wayland']
        steps:
            - uses: actions/checkout@v6
            - name: Build Docker image
              run: |
                docker build -t qtile-ci .
            - name: Run tests in container
              run: |
                mkdir coredumps
                sudo sysctl -w kernel.core_pattern=/workspace/coredumps/core-%e.%p.%t
                make ci-check
              env:
                QTILE_CI_PYTHON: ${{ matrix.python-version }}
                QTILE_CI_BACKEND: ${{ matrix.backend }}
                GITHUB_ACTIONS: true
                GITHUB_REF: ${{ github.ref }}
                GITHUB_SHA: ${{ github.sha }}
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                COVERALLS_FLAG_NAME: ${{ format('{0}-{1}', matrix.python-version, matrix.backend) }}
                COVERALLS_PARALLEL: true
                COVERALLS_SERVICE_JOB_ID: ${{ github.run_id }}
            - name: Upload coredumps
              if: always()
              uses: actions/upload-artifact@v7
              with:
                name: coredumps-py${{ matrix.python-version }}-${{ matrix.backend }}-${{ github.run_id }}
                path: coredumps/core*
                if-no-files-found: ignore

    coverage:
        name: Finalize Coverage
        needs: tests
        runs-on: ubuntu-24.04
        steps:
            - name: Coveralls Finished
              uses: coverallsapp/github-action@main
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                parallel-finished: true
