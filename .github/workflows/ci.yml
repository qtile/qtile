name: ci

on:
    push:
    pull_request:

jobs:
    build-image:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6

            - name: Build Docker image
              run: docker build -t qtile-ci:local .

            - name: Save Docker image
              run: docker save qtile-ci:local | gzip > qtile-ci.tar.gz

            - name: Upload Docker image
              uses: actions/upload-artifact@v6
              with:
                  name: docker-image
                  path: qtile-ci.tar.gz
                  retention-days: 1

    test:
        needs: build-image
        runs-on: ubuntu-24.04
        name: "python ${{ matrix.python-version }} on ${{ matrix.backend }}"
        strategy:
            matrix:
                python-version: ['3.12', '3.13', '3.14']
                backend: ['x11', 'wayland']
        steps:
            - uses: actions/checkout@v6

            - name: Download Docker image
              uses: actions/download-artifact@v8
              with:
                  name: docker-image

            - name: Load Docker image
              run: docker load < qtile-ci.tar.gz

            - name: Run tests in container
              run: |
                docker run --rm \
                  -v ${{ github.workspace }}:/workspace \
                  -w /workspace \
                  --user $(id -u):$(id -g) \
                  -e HOME=/workspace \
                  -e QTILE_CI_PYTHON=${{ matrix.python-version }} \
                  -e QTILE_CI_BACKEND=${{ matrix.backend }} \
                  -e GITHUB_ACTIONS=true \
                  -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
                  -e GITHUB_REF=${{ github.ref }} \
                  -e GITHUB_SHA=${{ github.sha }} \
                  -e COVERALLS_FLAG_NAME=${{ format('{0}-{1}', matrix.python-version, matrix.backend) }} \
                  -e COVERALLS_PARALLEL=true \
                  -e COVERALLS_SERVICE_JOB_ID=${{ github.run_id }} \
                  qtile-ci:local \
                  ./entrypoint.sh

    cleanup:
        name: Cleanup artifacts
        needs: test
        runs-on: ubuntu-24.04
        if: always()
        steps:
            - name: Delete Docker image artifact
              uses: geekyeggo/delete-artifact@v6
              with:
                  name: docker-image

    coverage:
        name: Finalize Coverage
        needs: test
        runs-on: ubuntu-24.04
        steps:
            - name: Coveralls Finished
              uses: coverallsapp/github-action@main
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                parallel-finished: true
